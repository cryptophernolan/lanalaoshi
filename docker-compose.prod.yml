services:
  backend:
    build: ./backend
    container_name: oi_bot_backend
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ./backend/config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Nginx = static dashboard files + reverse proxy cho /api và /ws
  # Build context là root (cần access cả dashboard/ lẫn nginx/)
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: oi_bot_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
