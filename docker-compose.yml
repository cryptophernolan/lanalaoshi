version: "3.9"

services:
  backend:
    build: ./backend
    container_name: oi_bot_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/config/.env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

  dashboard:
    image: node:20-alpine
    container_name: oi_bot_dashboard
    working_dir: /app
    volumes:
      - ./dashboard:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
