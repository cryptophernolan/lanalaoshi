server {
    listen 80;
    server_name _;

    # Docker internal DNS — resolve upstreams dynamically (không fail khi backend chưa sẵn)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── API backend (FastAPI) ──────────────────────────────────────
    location /api/ {
        set $backend http://backend:8000;
        proxy_pass         $backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # ── WebSocket ─────────────────────────────────────────────────
    location /ws {
        set $backend http://backend:8000;
        proxy_pass         $backend/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }

    # ── Dashboard (React SPA static files) ────────────────────────
    # Nginx tự serve file từ volume — không cần proxy qua dashboard container
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
